<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position, Transform e Váriaveis CSS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Usando Position</h2>
        <div class="box box-um">Lorem ipsum 1</div>
        <div class="box box-dois">Lorem ipsum 2</div>
        <div class="box box-tres">Lorem ipsum 3</div>
 
        <div class="box box-fixed">Elemento fixo</div>
    </div>
 
    <div class="container-transform">
        <div class="box-transform rotate">Rotate</div>
        <div class="box-transform scale">Scale</div>
        <div class="box-transform skew">Skew</div>
        <div class="box-transform translate">Translate</div>
    </div>
 
    <h3>Variáveis CSS</h3>
    <h4 class="title-1">Cor padrão</h4>
    <h4 class="title-2">Cor secundária</h4>
    <h4 class="title-3">Cor destaque</h4>
</body>
</html>
